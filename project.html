<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NearBy Finder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0f14;
            color: #eef0f7;
            font-family: 'DM Sans', Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 40px;
            background-color: #161a24;
            border-bottom: 1px solid #2a2f45;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Syne', Arial, sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: #eef0f7;
        }

        .logo span {
            color: #f5a623;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: #7a8099;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #f5a623;
        }

        .badge {
            background-color: #e8315b;
            color: #fff;
            font-size: 0.65rem;
            border-radius: 50%;
            padding: 2px 6px;
            margin-left: 3px;
            font-weight: 700;
        }

        /* HERO */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 36px;
            padding: 52px 40px;
            align-items: center;
        }

        .hero h1 {
            font-family: 'Syne', Arial, sans-serif;
            font-size: 2.8rem;
            line-height: 1.15;
            margin-bottom: 14px;
            color: #eef0f7;
        }

        .hero h1 span {
            color: #f5a623;
        }

        .hero p {
            color: #7a8099;
            font-size: 1rem;
            margin-bottom: 24px;
            line-height: 1.65;
        }

        .btn-primary {
            background-color: #f5a623;
            color: #0d0f14;
            border: none;
            padding: 13px 26px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'DM Sans', Arial, sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(245, 166, 35, 0.4);
        }

        .map-box {
            background-color: #1e2436;
            border: 1px solid #2a2f45;
            border-radius: 14px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            text-align: center;
            color: #7a8099;
            font-size: 0.9rem;
            overflow: hidden;
        }

        .map-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 14px;
        }

        #locStatus {
            text-align: center;
            padding: 8px;
            font-size: 0.88rem;
            color: #f5a623;
            min-height: 28px;
        }

        /* SEARCH */
        .search-wrap {
            padding: 4px 40px 32px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: #1e2436;
            border: 1px solid #2a2f45;
            border-radius: 50px;
            padding: 10px 18px;
            gap: 12px;
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #eef0f7;
            font-size: 0.92rem;
            font-family: 'DM Sans', Arial, sans-serif;
        }

        .search-box input::placeholder {
            color: #7a8099;
        }

        .search-box select {
            background-color: #161a24;
            border: 1px solid #2a2f45;
            color: #eef0f7;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: 'DM Sans', Arial, sans-serif;
        }

        .search-box select option {
            background-color: #161a24;
            color: #eef0f7;
        }

        .btn-search {
            background-color: #e8315b;
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', Arial, sans-serif;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .btn-search:hover {
            opacity: 0.85;
        }

        /* SECTIONS */
        .section {
            padding: 8px 40px 44px;
        }

        .sec-title {
            font-family: 'Syne', Arial, sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #eef0f7;
        }

        /* STORES */
        .stores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .store-card {
            background-color: #1e2436;
            border: 1px solid #2a2f45;
            border-radius: 14px;
            padding: 18px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .store-card:hover {
            transform: translateY(-4px);
            border-color: #f5a623;
        }

        .store-card .ic {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .store-card h3 {
            font-size: 0.92rem;
            margin-bottom: 5px;
            color: #eef0f7;
        }

        .store-card p {
            color: #7a8099;
            font-size: 0.78rem;
            line-height: 1.4;
        }

        .dist-tag {
            display: inline-block;
            background-color: rgba(245, 166, 35, 0.15);
            color: #f5a623;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            margin-top: 10px;
        }

        /* PRODUCTS */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 16px;
        }

        .product-card {
            background-color: #1e2436;
            border: 1px solid #2a2f45;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 9px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: #e8315b;
        }

        .prod-img {
            font-size: 2.8rem;
            text-align: center;
            background-color: #161a24;
            border-radius: 10px;
            padding: 14px;
        }

        .product-card h4 {
            font-size: 0.88rem;
            line-height: 1.3;
            color: #eef0f7;
        }

        .price {
            color: #f5a623;
            font-weight: 700;
            font-size: 1rem;
        }

        .store-tag {
            color: #7a8099;
            font-size: 0.75rem;
        }

        .btn-add {
            background-color: #e8315b;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 9px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'DM Sans', Arial, sans-serif;
            font-size: 0.82rem;
            transition: opacity 0.2s;
            margin-top: auto;
        }

        .btn-add:hover {
            opacity: 0.8;
        }

        /* CART */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 200;
        }

        .overlay.show {
            display: block;
        }

        .cart-panel {
            position: fixed;
            right: -380px;
            top: 0;
            width: 360px;
            height: 100vh;
            background-color: #161a24;
            border-left: 1px solid #2a2f45;
            z-index: 300;
            display: flex;
            flex-direction: column;
            padding: 22px;
            transition: right 0.32s ease;
            overflow-y: auto;
        }

        .cart-panel.open {
            right: 0;
        }

        .cart-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .cart-head h3 {
            font-family: 'Syne', Arial, sans-serif;
            font-size: 1.15rem;
            color: #eef0f7;
        }

        .close-btn {
            background: none;
            border: none;
            color: #7a8099;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #e8315b;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #1e2436;
            padding: 11px;
            border-radius: 10px;
        }

        .ci-ic {
            font-size: 1.6rem;
        }

        .ci-info {
            flex: 1;
        }

        .ci-info h5 {
            font-size: 0.84rem;
            margin-bottom: 2px;
            color: #eef0f7;
        }

        .ci-info p {
            color: #f5a623;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .ci-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .qty-btn {
            background-color: #161a24;
            border: 1px solid #2a2f45;
            color: #eef0f7;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            border-color: #f5a623;
            color: #f5a623;
        }

        .qty-num {
            font-size: 0.85rem;
            min-width: 18px;
            text-align: center;
            color: #eef0f7;
        }

        .ci-del {
            background: none;
            border: none;
            color: #e8315b;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 4px;
        }

        .cart-foot {
            border-top: 1px solid #2a2f45;
            padding-top: 14px;
            margin-top: 12px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .total-label {
            font-size: 0.9rem;
            color: #7a8099;
        }

        .total-amount {
            color: #f5a623;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .btn-checkout {
            background-color: #f5a623;
            color: #0d0f14;
            border: none;
            width: 100%;
            padding: 13px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', Arial, sans-serif;
            font-size: 0.92rem;
            transition: opacity 0.2s;
        }

        .btn-checkout:hover {
            opacity: 0.88;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background-color: #f5a623;
            color: #0d0f14;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 6px 22px rgba(245, 166, 35, 0.45);
            z-index: 150;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab:hover {
            transform: scale(1.1);
        }

        .fab-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background-color: #e8315b;
            color: #fff;
            font-size: 0.62rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 96px;
            right: 28px;
            background-color: #2a9d5c;
            color: #fff;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 400;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
            max-width: 280px;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .empty {
            color: #7a8099;
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
            line-height: 1.8;
        }

        @media (max-width: 760px) {
            .hero {
                grid-template-columns: 1fr;
                padding: 28px 18px;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .section,
            .search-wrap {
                padding-left: 18px;
                padding-right: 18px;
            }

            nav {
                padding: 14px 18px;
            }

            .cart-panel {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">📍 NearBy<span>Finder</span></div>
        <div class="nav-links">
            <a onclick="document.getElementById('stores').scrollIntoView({behavior:'smooth'})">Stores</a>
            <a onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">Products</a>
            <a onclick="openCart()">Cart <span class="badge" id="cartCount">0</span></a>
        </div>
    </nav>

    <div class="hero">
        <div>
            <h1>Find Stores<br /><span>Near You</span></h1>
            <p>Discover local shops, markets &amp; services in your area instantly.</p>
            <button class="btn-primary" id="detectBtn">📍 Detect My Location</button>
            <div class="map-section">
                <iframe src="https://www.google.com/maps?q=Ghaziabad&output=embed" width="100%" height="300"
                    style="border:0;">
                </iframe>
            </div>
        </div>
        <div class="map-box" id="mapBox">
            <div style="font-size:2.5rem">🗺️</div>
            <p>Map will appear here</p>
            <p style="font-size:0.75rem">Click Detect to load your map</p>
        </div>
    </div>

    <div id="locStatus"></div>

    <div class="search-wrap">
        <div class="search-box">
            <span style="color:#7a8099">🔍</span>
            <input type="text" id="searchInput" placeholder="Search stores or products..." />
            <select id="catFilter">
                <option value="all">All Categories</option>
                <option value="grocery">🛒 Grocery</option>
                <option value="electronics">💻 Electronics</option>
                <option value="fashion">👗 Fashion</option>
                <option value="pharmacy">💊 Pharmacy</option>
                <option value="restaurant">🍛 Restaurant</option>
            </select>
            <button class="btn-search" onclick="applyFilter()">Search</button>
        </div>
    </div>

    <div class="section" id="stores">
        <div class="sec-title">🏪 Nearby Stores</div>
        <div class="stores-grid" id="storesGrid"></div>
    </div>

    <div class="section" id="products">
        <div class="sec-title">🛒 Available Products</div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeCart()"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-head">
            <h3>🛍️ Your Cart</h3>
            <button class="close-btn" onclick="closeCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-foot">
            <div class="total-row">
                <span class="total-label">Total Amount</span>
                <span class="total-amount">₹<span id="cartTotal">0</span></span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Checkout →</button>
        </div>
    </div>

    <button class="fab" onclick="openCart()">
        🛒
        <span class="fab-badge" id="fabBadge">0</span>
    </button>

    <div class="toast" id="toast"></div>

    <script>
        const stores = [
            { id: 1, name: "Fresh Mart", ic: "🛒", cat: "grocery", addr: "Sector 12, Near You", dist: "0.3 km" },
            { id: 2, name: "TechZone", ic: "💻", cat: "electronics", addr: "Main Road, Block A", dist: "0.7 km" },
            { id: 3, name: "StyleHub", ic: "👗", cat: "fashion", addr: "City Center Mall", dist: "1.1 km" },
            { id: 4, name: "MedPlus", ic: "💊", cat: "pharmacy", addr: "Hospital Road", dist: "0.5 km" },
            { id: 5, name: "Spice Garden", ic: "🍛", cat: "restaurant", addr: "Food Street, Block 3", dist: "0.9 km" },
            { id: 6, name: "QuickBazaar", ic: "🏪", cat: "grocery", addr: "Lane 5, Old Market", dist: "1.4 km" },
            { id: 7, name: "Gadget World", ic: "📱", cat: "electronics", addr: "Tech Park, Gate 2", dist: "1.8 km" },
            { id: 8, name: "Urban Threads", ic: "🧥", cat: "fashion", addr: "Metro Station Road", dist: "2.0 km" },
        ];
        const products = [
            { id: 1, name: "Basmati Rice 5kg", ic: "🌾", price: 299, store: "Fresh Mart", cat: "grocery" },
            { id: 2, name: "Wireless Earbuds", ic: "🎧", price: 1499, store: "TechZone", cat: "electronics" },
            { id: 3, name: "Cotton Kurta", ic: "👕", price: 599, store: "StyleHub", cat: "fashion" },
            { id: 4, name: "Paracetamol Strip", ic: "💊", price: 45, store: "MedPlus", cat: "pharmacy" },
            { id: 5, name: "Chicken Biryani", ic: "🍗", price: 220, store: "Spice Garden", cat: "restaurant" },
            { id: 6, name: "Phone Charger 65W", ic: "🔌", price: 349, store: "TechZone", cat: "electronics" },
            { id: 7, name: "Atta 10kg", ic: "🌿", price: 380, store: "QuickBazaar", cat: "grocery" },
            { id: 8, name: "Sunglasses", ic: "🕶️", price: 799, store: "StyleHub", cat: "fashion" },
            { id: 9, name: "Amul Butter 500g", ic: "🧈", price: 125, store: "Fresh Mart", cat: "grocery" },
            { id: 10, name: "Cough Syrup", ic: "🩺", price: 85, store: "MedPlus", cat: "pharmacy" },
            { id: 11, name: "Smart Watch", ic: "⌚", price: 2999, store: "Gadget World", cat: "electronics" },
            { id: 12, name: "Paneer Tikka", ic: "🍢", price: 180, store: "Spice Garden", cat: "restaurant" },
            { id: 13, name: "Denim Jacket", ic: "🧥", price: 1299, store: "Urban Threads", cat: "fashion" },
            { id: 14, name: "Bluetooth Speaker", ic: "🔊", price: 899, store: "Gadget World", cat: "electronics" },
        ];

        let cart = [];

        function renderStores(data) {
            const g = document.getElementById('storesGrid');
            g.innerHTML = data.length ? data.map(s =>
                `<div class="store-card" onclick="filterByStore('${s.name}')">
      <div class="ic">${s.ic}</div>
      <h3>${s.name}</h3>
      <p>${s.addr}</p>
      <span class="dist-tag">📍 ${s.dist}</span>
    </div>`).join('') : '<div class="empty">No stores found.</div>';
        }

        function renderProducts(data) {
            const g = document.getElementById('productsGrid');
            g.innerHTML = data.length ? data.map(p =>
                `<div class="product-card">
      <div class="prod-img">${p.ic}</div>
      <h4>${p.name}</h4>
      <p class="store-tag">🏪 ${p.store}</p>
      <p class="price">₹${p.price.toLocaleString('en-IN')}</p>
      <button class="btn-add" onclick="addToCart(${p.id})">+ Add to Cart</button>
    </div>`).join('') : '<div class="empty">No products found.</div>';
        }

        function applyFilter() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const cat = document.getElementById('catFilter').value;
            renderStores(stores.filter(s => (cat === 'all' || s.cat === cat) && s.name.toLowerCase().includes(q)));
            renderProducts(products.filter(p => (cat === 'all' || p.cat === cat) && (p.name.toLowerCase().includes(q) || p.store.toLowerCase().includes(q))));
        }

        function filterByStore(name) {
            document.getElementById('searchInput').value = '';
            document.getElementById('catFilter').value = 'all';
            renderProducts(products.filter(p => p.store === name));
            document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
            showToast('🏪 Products from ' + name);
        }

        document.getElementById('searchInput').addEventListener('keyup', e => { if (e.key === 'Enter') applyFilter(); });
        document.getElementById('catFilter').addEventListener('change', applyFilter);

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const ex = cart.find(x => x.id === id);
            ex ? ex.qty++ : cart.push({ ...p, qty: 1 });
            updateCart();
            showToast(p.ic + ' ' + p.name + ' added!');
            openCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(x => x.id === id);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
            updateCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(x => x.id !== id);
            updateCart();
        }

        function updateCart() {
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('fabBadge').textContent = count;
            document.getElementById('cartTotal').textContent = total.toLocaleString('en-IN');
            const ci = document.getElementById('cartItems');
            if (!cart.length) {
                ci.innerHTML = '<div class="empty">🛒<br/>Cart is empty<br/><span style="font-size:0.78rem">Add items to get started</span></div>';
                return;
            }
            ci.innerHTML = cart.map(i =>
                `<div class="cart-item">
      <div class="ci-ic">${i.ic}</div>
      <div class="ci-info">
        <h5>${i.name}</h5>
        <p>₹${(i.price * i.qty).toLocaleString('en-IN')}</p>
      </div>
      <div class="ci-controls">
        <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
        <span class="qty-num">${i.qty}</span>
        <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
        <button class="ci-del" onclick="removeFromCart(${i.id})">🗑</button>
      </div>
    </div>`).join('');
        }

        function checkout() {
            if (!cart.length) { showToast('❌ Cart is empty!'); return; }
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            showToast('✅ Order placed! ₹' + total.toLocaleString('en-IN') + ' — Thank you!');
            cart = []; updateCart(); closeCart();
        }

        function openCart() {
            document.getElementById('cartPanel').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }
        function closeCart() {
            document.getElementById('cartPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        document.getElementById('detectBtn').addEventListener('click', () => {
            const s = document.getElementById('locStatus');
            s.innerHTML = '⏳ Detecting your location...';
            if (!navigator.geolocation) { s.innerHTML = '❌ Geolocation not supported.'; return; }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    s.innerHTML = '✅ Location found: <strong>' + lat.toFixed(4) + ', ' + lng.toFixed(4) + '</strong>';
                    document.getElementById('mapBox').innerHTML =
                        '<iframe src="https://www.openstreetmap.org/export/embed.html?bbox=' +
                        (lng - 0.01) + '%2C' + (lat - 0.01) + '%2C' + (lng + 0.01) + '%2C' + (lat + 0.01) +
                        '&layer=mapnik&marker=' + lat + '%2C' + lng +
                        '" style="width:100%;height:280px;border:none;border-radius:14px"></iframe>';
                    showToast('📍 Location detected!');
                },
                err => { s.innerHTML = '❌ ' + err.message; }
            );
        });

        renderStores(stores);
        renderProducts(products);
        updateCart();
    </script>
</body>

</html>
